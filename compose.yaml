services:

  kali:
    build: ./kali_df
    image: kali_headless:v1
    container_name: kali_attacker
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    networks:
      - net1
  
  mysql:
    image: mysql:latest
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: simulator_db
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - net1

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata_ids
    restart: unless-stopped
    tty: true
    stdin_open: true
    network_mode: "service:mysql"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./logs:/var/log/suricata
    command: -i eth0

  evebox:
    image: jasonish/evebox:latest
    container_name: evebox
    ports:
      - "5636:5636"
    volumes:
      - ./logs:/var/log/suricata
    networks:
      - net1
    command: evebox server -D . --datastore sqlite --input /var/log/suricata/eve.json

networks:

  net1:
    name: net1
    driver: bridge
